<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
</head>
<body>
<script>
(function () {
  function isAllowedParentOrigin(origin) {
    if (!origin) return false;
    if (origin === 'https://pongvitsam.github.io') return true;
    if (origin.indexOf('https://pongvitsam.github.io/') === 0) return true;
    if (origin.indexOf('http://localhost') === 0) return true;
    if (origin.indexOf('https://script.google.com') === 0) return true;
    if (origin.indexOf('https://script.googleusercontent.com') === 0) return true;
    if (/^https:\/\/n-[a-z0-9]+-script\.googleusercontent\.com$/i.test(origin)) return true;
    return false;
  }

  function reply_(source, origin, payload) {
    if (!source || !isAllowedParentOrigin(origin)) return;
    try {
      source.postMessage(payload, origin);
    } catch (e) {
      try {
        source.postMessage(payload, '*');
      } catch (e2) {}
    }
  }

  window.addEventListener('message', function (e) {
    if (!isAllowedParentOrigin(e.origin)) return;
    var msg = e.data;
    if (!msg) return;

    if (msg.type === 'gas-bridge-ping') {
      reply_(e.source, e.origin, { type: 'gas-bridge', ready: true });
      return;
    }

    if (msg.type !== 'gas-bridge' || !msg.function) return;

    var fn = msg.function;
    var args = msg.args || [];
    var runner = google.script.run
      .withSuccessHandler(function (result) {
        reply_(e.source, e.origin, { type: 'gas-bridge', id: msg.id, ok: true, result: result });
      })
      .withFailureHandler(function (err) {
        reply_(e.source, e.origin, {
          type: 'gas-bridge',
          id: msg.id,
          ok: false,
          error: err && err.message ? err.message : String(err),
        });
      });

    if (typeof runner[fn] !== 'function') {
      reply_(e.source, e.origin, {
        type: 'gas-bridge',
        id: msg.id,
        ok: false,
        error: 'Unknown function: ' + fn,
      });
      return;
    }
    runner[fn].apply(runner, args);
  });

  if (window.parent !== window) {
    try {
      window.parent.postMessage({ type: 'gas-bridge', ready: true }, '*');
    } catch (e) {}
  }
})();
</script>
</body>
</html>
