  <link rel="dns-prefetch" href="https://script.google.com">
  <link rel="preconnect" href="https://script.google.com" crossorigin>
  <script>
  (function () {
    var LS_KEY = 'pk2_initial_ls_v1';
    var GAS_API = '__GAS_EXEC_URL__';
    var MAX_AGE = 86400000;

    try {
      var raw = localStorage.getItem(LS_KEY);
      if (raw) {
        var o = JSON.parse(raw);
        if (o && o.data && o.data.apps && Date.now() - o.t < MAX_AGE) {
          window.__BOOT_DATA__ = o.data;
        }
      }
    } catch (e) {}

    var cb = '__pf_' + Date.now();
    window[cb] = function (res) {
      try { delete window[cb]; } catch (e) {}
      var el = document.getElementById('gas-prefetch');
      if (el && el.parentNode) el.parentNode.removeChild(el);
      if (res && res.ok && res.data) {
        window.__PREFETCH_DATA__ = res.data;
        try {
          localStorage.setItem(LS_KEY, JSON.stringify({ t: Date.now(), data: res.data }));
        } catch (e) {}
        try {
          window.dispatchEvent(new CustomEvent('pk2-prefetch-ready', { detail: res.data }));
        } catch (e2) {}
      }
    };
    var s = document.createElement('script');
    s.id = 'gas-prefetch';
    s.async = true;
    s.onerror = function () {
      try { delete window[cb]; } catch (e) {}
      var el = document.getElementById('gas-prefetch');
      if (el && el.parentNode) el.parentNode.removeChild(el);
    };
    s.src = GAS_API + '?action=getInitialData&callback=' + encodeURIComponent(cb) + '&_=' + Date.now();
    document.head.appendChild(s);
  })();
  </script>
